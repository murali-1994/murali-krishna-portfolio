name: Mirror to Client Repo

on:
  push:
    branches: [ main ]

jobs:
  mirror:
    if: github.repository_owner == 'PrayagN' 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Client Repo
        env:
          TOKEN: ${{ secrets.CLIENT_GITHUB_TOKEN }}
        run: |
          git remote rm client || true
          git remote add client https://murali-1994:${TOKEN}@github.com/murali-1994/murali-krishna-portfolio.git
          git push --force client main